<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crimson Butterfly</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menuScreen">
  <div class="menu-title">🌙 Crimson Butterfly</div>

  <button id="startBtn">Start</button>
  <button id="continueBtn">Continue</button>
  <button id="settingsBtn">Settings</button>
</div>

<!-- SETTINGS -->
<div id="settingsPanel" class="hidden">
  <h2>Settings</h2>

  <label>Music <input type="checkbox" id="musicToggle" checked></label>
  <label>Sound <input type="checkbox" id="soundToggle" checked></label>

  <button id="closeSettings">Close</button>
</div>

<!-- GAME -->
<div id="dialogueBox">
  <div id="storyText"></div>
</div>

<div id="choices"></div>

<div id="ending"></div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="https://files.catbox.moe/kpq69l.mp3">
</audio>

<audio id="clickSound">
  <source src="https://files.catbox.moe/kpq69l.mp3">
</audio>

<div id="cursor"></div>

<script src="script.js"></script>

</body>
</html>
