<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crimson Butterfly</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menuScreen">
  <div class="menu-title">🌙 Crimson Butterfly</div>
  <button id="startBtn">Start</button>
</div>

<!-- GAME UI -->
<div id="game">

  <div id="storyBox">
    <div id="storyText"></div>
  </div>

  <div id="questionBox">
    <div id="questionText"></div>
  </div>

  <div id="choices"></div>

</div>

<!-- ENDING -->
<div id="ending"></div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="https://files.catbox.moe/kpq69l.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
  <source src="https://files.catbox.moe/kpq69l.mp3" type="audio/mpeg">
</audio>

<!-- CURSOR -->
<div id="cursor"></div>

<script src="script.js"></script>

</body>
</html>
