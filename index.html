<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crimson Butterfly</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menuScreen">
  <button id="startBtn">Start</button>
</div>

<!-- GAME -->
<div id="game">

    <!-- STORY / PROLOGUE -->
    <div id="dialogueBox">
        <div id="storyText"></div>
    </div>

    <!-- QUESTION -->
    <div id="questionBox">
        <div id="questionText"></div>
    </div>

    <!-- CHOICES -->
    <div id="choices"></div>

    <!-- ENDINGS -->
    <div id="ending"></div>

</div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="https://files.catbox.moe/kpq69l.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
  <source src="https://files.catbox.moe/kpq69l.mp3" type="audio/mpeg">
</audio>

<div id="cursor"></div>

<script src="script.js"></script>
</body>
</html>
